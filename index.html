EM: En relación a parámetros del padre
REM: En relación al HTML, Recomendado
Medidas útiles con max y min-width
Position por defecto como static

Display:

flex-wrap: wrap; 
justify-content: center o space-evenly o flex-end; 
align-items: center o flex-start o stretch o baseline; 
order: 1, 2, 3, 4;
