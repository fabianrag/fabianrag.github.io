<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Desplegable</title>
    <style>
        body
        {
            margin: 0;
        }
        .header
        {
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background-color: aqua;
        }
        .header__menu
        {
            margin-right: 30px;
        }
        .header__menu:hover ul, ul:hover
        {
            display: block;
        }
        .header__menu--icon
        {
            display: flex;
            align-items: center;
        }
        .header__menu--icon img
        {
            width: 40px;
        }
        .header__menu--icon p
        {
            margin: 0 0 0 5px;
            color: blueviolet;
        }
        .header__menu--list
         {
            display: none;
            list-style: none;
            padding: 0;
            position: absolute;
            width: 100px;
            text-align: right;
            margin: 0 0 0 -19px;
         }
         .header__menu--list li
         {
            margin: 10px 0;
         }
         .header__menu--list a
         {
            text-decoration: none;
         }
    </style>
</head>
<body>
    <header class="header">
        <div class="header__menu">
            <div class="header__menu--icon">
                <img src="https://i.imgur.com/o4VXYCN.png" alt="">
                <p>Menu</p>
            </div>
            <ul class="header__menu--list">
                <li><a href="">First link</a></li>
                <li><a href="">Second link</a></li>
            </ul>
        </div>
    </header>
</body>
</html>
